<!DOCTYPE html>
<html>
<head>
    <title>AI Prompt Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .navbar {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .brand {
            font-weight: bold;
            font-size: 22px;
            color: #6C63FF !important;
        }

        .main-container {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 30px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }

        textarea {
            background: rgba(255,255,255,0.08) !important;
            border: none !important;
            color: white !important;
        }

        textarea::placeholder {
            color: #ccc;
        }

        .btn-ai {
            background: linear-gradient(45deg, #6C63FF, #00E5FF);
            border: none;
            color: white;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-ai:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px #6C63FF;
        }

        pre {
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 10px;
            color: #00E5FF;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <span class="navbar-brand brand">🤖 PromptAI</span>

    <div class="ms-auto">
        <a href="/" class="btn btn-sm btn-outline-light me-2">Home</a>
        <a href="/history/" class="btn btn-outline-light">History</a>
        <a href="{% url 'how_it_works' %}" class="btn btn-outline-light">About</a>
        <form action="/accounts/logout/" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Logout</button>
</form>
    </div>
  </div>
</nav>

<div class="main-container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
