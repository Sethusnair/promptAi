<!DOCTYPE html>
<html>
<head>

<title >PromptAI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

body{
background:#0f172a;
color:white;
margin:0;
font-family:system-ui;
min-height:100vh;
}

#title{
    margin-left: 50px;
}
/* PARTICLES */

#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:-100%;
top:0;
width:260px;
height:100%;
background:#020617;
padding:20px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,0.05);
transition:left 0.3s ease;
z-index:2000;
}

.sidebar.active{
left:0;
}

/* SIDEBAR HEADER */

.sidebar-header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
}

.sidebar-header h3{
color:#6C63FF;
margin:0;
}

.close-btn{
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
}

/* SIDEBAR LINKS */

.sidebar a{
display:block;
color:#cbd5e1;
text-decoration:none;
padding:10px 12px;
border-radius:8px;
font-size:14px;
margin-bottom:6px;
transition:0.2s;
}

.sidebar a:hover{
background:#1e293b;
transform:translateX(4px);
}

/* PROFILE */

.profile-box{
background:#1e293b;
padding:14px;
border-radius:10px;
margin-bottom:20px;
font-size:13px;
color:#cbd5e1;
}

/* MENU BUTTON */

.menu-btn{
position:fixed;
top:20px;
left:20px;
font-size:26px;
background:none;
border:none;
color:white;
cursor:pointer;
z-index:1000;
}

/* Hide button when sidebar is open */

.sidebar.active ~ .menu-btn{
display:none;
}

/* OVERLAY */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
display:none;
z-index:1500;
}

.overlay.active{
display:block;
}

/* PAGE CONTENT */

.page-content{
padding:80px 20px 40px 20px;
max-width:1100px;
margin:auto;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="sidebar-header">

<h3 id="title">PromptAI</h3>

<button class="close-btn" onclick="closeSidebar()">✕</button>

</div>

<div class="profile-box">

<b>{{ request.user.username }}</b><br>

{% if profile %}
{{ profile.profession }}<br>
{{ profile.current_role }}<br>
{{ profile.experience }} years
{% endif %}

</div>

<b style="color:#94a3b8;">Menu</b>

<a href="/home/">🏠 Home</a>
<a href="/history/">🕘 History</a>
<a href="/profile/">👤 Profile</a>
<a href="/how-it-works/">🤷‍♀️ About</a>

<form action="/accounts/logout/" method="post">
{% csrf_token %}
<button class="btn btn-danger w-100 mt-2">Logout</button>
</form>

</div>

<!-- MENU BUTTON -->

<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<!-- OVERLAY -->

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- PAGE CONTENT -->

<div class="page-content">

{% block content %}
{% endblock %}

</div>

<script>

/* SIDEBAR */

function toggleSidebar(){

document.getElementById("sidebar").classList.add("active")
document.getElementById("overlay").classList.add("active")

}

function closeSidebar(){

document.getElementById("sidebar").classList.remove("active")
document.getElementById("overlay").classList.remove("active")

}

/* PARTICLES */

particlesJS("particles-js",{

particles:{
number:{value:60},
color:{value:"#6C63FF"},
shape:{type:"circle"},
opacity:{value:0.4},
size:{value:3,random:true},
line_linked:{
enable:true,
distance:150,
color:"#00E5FF",
opacity:0.3,
width:1
},
move:{
enable:true,
speed:2
}
},

interactivity:{
events:{
onhover:{enable:true,mode:"repulse"},
onclick:{enable:true,mode:"push"}
}
},

retina_detect:true

})

</script>

</body>
</html>
