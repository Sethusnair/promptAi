<!DOCTYPE html>
<html>
<head>
<title>Login - PromptAI</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<style>

body{
height:100vh;
background:#0f172a;
display:flex;
align-items:center;
justify-content:center;
font-family:'Segoe UI',sans-serif;
overflow:hidden;
}

/* PARTICLE BACKGROUND */

#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
}

/* CONTAINER */

.login-container{
width:100%;
max-width:400px;
padding:20px;
}

/* GLASS CARD */

.glass-card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:18px;
padding:35px;
border:1px solid rgba(255,255,255,0.08);
box-shadow:0 0 40px rgba(0,0,0,0.4);
animation:slideUp 0.6s ease;
}

/* ANIMATION */

@keyframes slideUp{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* TITLE */

.title{
text-align:center;
font-weight:700;
font-size:26px;
margin-bottom:10px;
color:#6C63FF;
text-shadow:0 0 12px #6C63FF;
}

.subtitle{
text-align:center;
color:#aaa;
margin-bottom:25px;
}

/* INPUTS */

.form-control{
background:rgba(255,255,255,0.08);
border:none;
color:white;
height:45px;
}

.form-control:focus{
background:rgba(255,255,255,0.12);
color:white;
outline:none;
box-shadow:0 0 10px #6C63FF;
}

/* LABEL */

label{
color:#ccc;
font-size:14px;
}

/* BUTTON */

.btn-ai{
background:linear-gradient(45deg,#6C63FF,#00E5FF);
border:none;
color:white;
height:45px;
font-weight:600;
margin-top:10px;
transition:0.3s;
}

.btn-ai:hover{
transform:translateY(-2px);
box-shadow:0 0 15px #6C63FF;
}

/* SIGNUP LINK */

.signup-link{
text-align:center;
margin-top:15px;
color:#bbb;
}

.signup-link a{
color:#00E5FF;
text-decoration:none;
}

.signup-link a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<!-- PARTICLE BACKGROUND -->
<div id="particles-js"></div>

<div class="login-container">

<div class="glass-card">

<div class="title">🤖 PromptAI</div>

<div class="subtitle">Login to continue</div>

<form method="post">

{% csrf_token %}

<div class="mb-3">
<label>Username</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<button class="btn btn-ai w-100">Login</button>

</form>

<div class="signup-link">
New user?
<a href="/signup/">Create account</a>
</div>

</div>

</div>


<script>

particlesJS("particles-js", {

"particles": {

"number": {
"value": 70,
"density": {
"enable": true,
"value_area": 800
}
},

"color": {
"value": "#6C63FF"
},

"shape": {
"type": "circle"
},

"opacity": {
"value": 0.5
},

"size": {
"value": 3,
"random": true
},

"line_linked": {
"enable": true,
"distance": 150,
"color": "#00E5FF",
"opacity": 0.4,
"width": 1
},

"move": {
"enable": true,
"speed": 2
}

},

"interactivity": {

"detect_on": "canvas",

"events": {

"onhover": {
"enable": true,
"mode": "repulse"
},

"onclick": {
"enable": true,
"mode": "push"
}

},

"modes": {

"repulse": {
"distance": 100
},

"push": {
"particles_nb": 4
}

}

},

"retina_detect": true

});

</script>

</body>
</html>
